<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sem conexão com a internet</title>

    <style>
      :root {
        --primary: #3b82f6;
        --primary-soft: rgba(59, 130, 246, 0.1);
        --background: #f9fafb;
        --text: #111827;
        --muted: #6b7280;
        --border: #e5e7eb;
        --surface: #ffffff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Arial, sans-serif;
        background: var(--background);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      header,
      footer {
        min-height: 64px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        background: #fff;
        font-weight: 700;
        padding: 0 20px;
      }

      header {
        font-size: 1.5rem;
        font-weight: 700;
      }

      .header-link,
      .header-link:visited,
      .header-link:hover,
      .header-link:active,
      .header-link:focus {
        color: inherit;
        text-decoration: none;
      }

      footer {
        border-top: 1px solid var(--border);
        border-bottom: 0;
        color: var(--muted);
        font-weight: 500;
        font-size: 14px;
      }

      main {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 48px 16px;
      }

      .wrapper {
        width: 100%;
        max-width: 560px;
        text-align: center;
      }

      .icon {
        width: 96px;
        height: 96px;
        margin: 0 auto 28px;
        border-radius: 999px;
        background: var(--primary-soft);
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .icon svg {
        width: 48px;
        height: 48px;
        stroke: var(--primary);
        stroke-width: 2;
        fill: none;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      h1 {
        margin: 0 0 12px;
        font-size: 32px;
        line-height: 1.2;
        font-weight: 700;
      }

      p {
        margin: 0 auto;
        max-width: 460px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.6;
      }

      .actions {
        margin: 32px 0;
        display: flex;
        gap: 12px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 14px 22px;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
      }

      .btn-primary {
        background: var(--primary);
        color: #fff;
      }

      .btn-primary:hover {
        opacity: 0.92;
      }

      .card {
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        background: #fff;
        color: #111827;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }

      .card-header {
        padding: 24px 24px 0;
      }

      .card-title {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        line-height: 1.2;
      }

      .card-content {
        padding: 24px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .link-btn {
        display: inline-flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        border: 1px solid #e5e7eb;
        background: #fff;
        color: #111827;
        text-decoration: none;
        border-radius: 8px;
        padding: 16px;
        font-size: 14px;
        font-weight: 400;
        transition: 0.2s;
      }

      .link-btn:hover {
        background: #f8fafc;
      }

      .link-btn svg {
        width: 18px;
        height: 18px;
        stroke: #3b82f6;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        flex-shrink: 0;
      }

      .footer {
        background: #fff;
        padding: 0 16px;
      }

      .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 0;

        display: flex;
        flex-direction: row;
        align-items: center;
        gap: 16px;
      }

      .footer-copy {
        margin: 0;
        font-size: 14px;
        color: #6b7280;
        text-align: center;
      }

      .footer-nav {
        display: flex;
        align-items: center;
        gap: 24px;
        text-align: center;
      }

      .footer-nav a {
        text-decoration: none;
        font-size: 14px;
        color: #6b7280;
        transition: color 0.2s ease;
      }

      .footer-nav a:hover {
        color: #3b82f6;
      }

      .footer-nav .full {
        grid-column: auto;
      }

      @media (max-width: 640px) {
        h1 {
          font-size: 28px;
        }
        .actions {
          flex-direction: column;
        }
        .btn {
          width: 100%;
        }
        .footer-container {
          flex-direction: column;
        }
        .footer-copy {
          text-align: left;
        }
        .footer-nav {
          display: grid;
          grid-template-columns: repeat(2, auto);
        }
        .footer-nav .full {
          grid-column: 1 / -1;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <a href="/" class="header-link">Ethos</a>
    </header>

    <main>
      <section class="wrapper">
        <div class="icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="24"
            height="24"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-wifi-off-icon lucide-wifi-off"
          >
            <path d="M12 20h.01" />
            <path d="M8.5 16.429a5 5 0 0 1 7 0" />
            <path d="M5 12.859a10 10 0 0 1 5.17-2.69" />
            <path d="M19 12.859a10 10 0 0 0-2.007-1.523" />
            <path d="M2 8.82a15 15 0 0 1 4.177-2.643" />
            <path d="M22 8.82a15 15 0 0 0-11.288-3.764" />
            <path d="m2 2 20 20" />
          </svg>
        </div>

        <h1>Sem Conexão com a Internet</h1>

        <p>
          Parece que você está offline. Verifique sua conexão com a internet e
          tente novamente.
        </p>

        <div class="actions">
          <button class="btn btn-primary" onclick="window.location.reload()">
            Tentar novamente
          </button>
        </div>

        <div class="card">
          <div class="card-header">
            <h3 class="card-title">Links Úteis</h3>
          </div>

          <div class="card-content">
            <a class="link-btn" href="/">
              <span>Página inicial</span>

              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
              </svg>
            </a>

            <a class="link-btn" href="/#como-funciona">
              <span>Como funciona</span>

              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
              </svg>
            </a>

            <a class="link-btn" href="/#contato">
              <span>Entre em Contato</span>

              <svg viewBox="0 0 24 24" fill="none">
                <path d="M5 12h14"></path>
                <path d="m12 5 7 7-7 7"></path>
              </svg>
            </a>
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-container">
        <p class="footer-copy">© 2026 Ethos. Todos os direitos reservados.</p>

        <nav class="footer-nav">
          <a href="/#como-funciona">Como Funciona</a>
          <a href="/#sobre-etica">Sobre Ética</a>
          <a href="/#contato" class="full">Contato</a>
        </nav>
      </div>
    </footer>
  </body>
</html>
