name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      # 1️⃣ Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 3️⃣ Dependencies
      - name: Install dependencies
        run: npm ci

      # 4️⃣ Lint
      - name: Run lint
        run: npm run lint --if-present

      # 5️⃣ Build
      - name: Build
        run: npm run build

      # 6️⃣ Deploy Dev
      - name: Deploy Dev
        if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
        env:
          deploy_url: ${{ secrets.RENDER_DEPLOY_HOOK_URL_DEV }}
        run: curl "$deploy_url"
